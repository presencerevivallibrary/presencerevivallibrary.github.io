name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build site
        run: python scripts/build_site.py

      - name: Prepare static site
        run: |
          touch website/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow
        continue-on-error: true
        if: hashFiles('website/indexnow.json') != ''
        run: |
          http_code=$(curl --silent --show-error \
            --output indexnow-response.txt \
            --write-out "%{http_code}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary @website/indexnow.json \
            https://api.indexnow.org/indexnow)
          echo "IndexNow HTTP status: $http_code"
          if [ -s indexnow-response.txt ]; then
            echo "IndexNow response body:"
            cat indexnow-response.txt
          fi
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
